<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Brewing Beans</title>
    <link rel="stylesheet" href="styles2.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <h2 class ="logo">Brewing beans</h2>
            <ul class ="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Our Journey</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="contact.html" class ="btn-cta">Order Now</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero-section" style="height:34vh; display:flex; align-items:center;">
        <div class="container">
            <h1>Get in touch</h1>
            <p>Questions, events, or bulk orders — we'd love to hear from you.</p>
        </div>
    </header>

    <main class="container" style="padding:50px 0;">
        <section class="contact-form">
            <form style="max-width:600px; margin:0 auto; display:flex; flex-direction:column; gap:12px;">
                <input type="text" placeholder="Your name" style="padding:10px; border-radius:6px; border:1px solid #ddd;"/>
                <input type="email" placeholder="Your email" style="padding:10px; border-radius:6px; border:1px solid #ddd;"/>
                <textarea placeholder="Message" rows="6" style="padding:10px; border-radius:6px; border:1px solid #ddd;"></textarea>
                <button class="btn-cta" type="button">Send Message</button>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 Brewing Beans. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
